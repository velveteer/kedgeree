name: Example Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.10'
          cabal-version: '3.12'

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-${{ hashFiles('**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-

      - name: Build kedgeree
        run: |
          cabal update
          cabal build

      - name: Render the example with the Kedgeree theme
        run: ./example/build-demo.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: example/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
