name: Example Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.14'
          cabal-version: '3.14'

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
            .landing-build
          key: ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-${{ hashFiles('**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-

      - name: Build kedgeree
        run: |
          cabal update
          # Force re-embedding of the theme assets: file-embed does not always
          # invalidate a cached build when only assets/ changed.
          touch src/Kedgeree/Assets.hs
          cabal build

      - name: Build the example landing site
        # Builds kedgeree-demo plus a few real Hackage packages (lens, aeson,
        # containers) into a themed multi-package landing. The first run builds
        # those packages' docs; later runs reuse the cached .landing-build dir.
        run: ./example/build-site.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: example/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
